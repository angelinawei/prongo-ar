<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body style="margin:0">
  <model-viewer
    id="ar-fox"
    src="good_enough.glb"
    ios-src="good_enough.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    autoplay
    animation-name="*"
    style="width:100%; height:100vh; background:#eee">
  </model-viewer>

  <script>
    const viewer = document.getElementById('ar-fox');
    viewer.addEventListener('load', () => {
      viewer.activateAR();
    });
  </script>
</body>
</html>
